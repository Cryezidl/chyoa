{{ define "the end" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <style>
        :root {
            --bg-color: #1a1b26;
            --text-color: #a9b1d6;
            --accent-color: #7aa2f7;
            --title-color: #f7768e;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.8; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center; 
        }

        h1 { 
            color: var(--title-color); 
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .paragraphs-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }

        .paragraph { 
            margin-bottom: 20px; 
            font-size: 1.1rem;
            font-style: italic;
        }

        .end-message {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 40px;
        }

        .restart-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .restart-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>

    <div class="paragraphs-container">
        {{ range .Paragraphs }}
            <div class="paragraph">{{ . }}</div>
        {{ end }}
    </div>
    
    <div class="end-message">Thank you for journey we shared!</div>
    
    <a href="/api/v1/cyoa/intro" class="restart-btn">PLAY AGAIN</a>
</body>
</html>
{{ end }}
